services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: assistkb-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ingestion:
    build:
      context: .
      dockerfile: app/ingestion/Dockerfile
    container_name: assistkb-ingestion
    environment:
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
    volumes:
      - ./corpus:/app/corpus

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: assistkb-api
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
    depends_on:
      - qdrant

  embedding:
    build:
      context: .
      dockerfile: app/embedding/Dockerfile
    container_name: assistkb-embedding
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./corpus:/app/corpus
    depends_on:
      - qdrant

volumes:
  qdrant_data:
